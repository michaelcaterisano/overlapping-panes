<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overlapping Panes</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
      }
      canvas {
        display: block;
        position: relative;
        z-index: 100;
      }
      .hue-slider {
        position: absolute;
        z-index: 200;
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: #ddd;
        outline: none;
        border-radius: 4px;
      }
      .hue-slider::-webkit-slider-thumb,
      .hue-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #fff;
        border: 2px solid #888;
        border-radius: 50%;
        cursor: pointer;
      }
      @media (any-pointer: coarse) {
        .hue-slider {
          height: 24px;
        }
        .hue-slider::-webkit-slider-thumb,
        .hue-slider::-moz-range-thumb {
          width: 32px;
          height: 32px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script>
      // ---- Global Constants ----
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const RESIZE_MARGIN = 30;
      const SLIDER_RANGE = 800;
      const MIN_PANE_SIZE = 50;
      const MAX_PANE_WIDTH = 300;
      const MAX_PANE_HEIGHT = 300;
      const MIN_PANE_WIDTH = 100;
      const MIN_PANE_HEIGHT = 100;
      const GRID_COLUMNS = 50;
      const GRID_ROWS = 50;
      const REF_AREA = 30000;
      const LONG_PRESS_DURATION = 800;
      const DOUBLE_CLICK_THRESHOLD = 300;
      const TOUCH_RESIZE_MARGIN_MULTIPLIER = 2;
      const SLIDER_REMOVAL_DELAY = 500;
      const OSCILLATOR_STOP_DELAY = 60;
      const PERFECT_FIFTH_RATIO = 1.5;
      const PERFECT_FIFTH_TOLERANCE = 0.01;

      let cellArea;
      let cellHeight;
      let cellWidth;

      // ---- Application State ----
      const appState = {
        selectedPane: null,
        isDragging: false,
        resizing: false,
        dragOffsetX: 0,
        dragOffsetY: 0,
        resizeOffsetX: 0,
        resizeOffsetY: 0,
        lastTap: 0,
        tapTimeout: null,
        longPressTimeout: null,
        panes: [],
        compositeOscillators: {},
      };

      // Resize handler to update canvas dimensions and dependent variables
      function handleResize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cellWidth = canvas.width / GRID_COLUMNS;
        cellHeight = canvas.height / GRID_ROWS;
        cellArea = cellWidth * cellHeight;
      }

      // Attach the resize handler and call it immediately
      window.addEventListener("resize", handleResize);
      handleResize();

      // ---- Pane Class ----
      class Pane {
        constructor(x, y, width, height, sliderValue) {
          this.id = Pane.idCounter++;
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
          this.slider = null;
          this.setColorAndFrequency(sliderValue);
          this.setupAudio();
        }

        setColorAndFrequency(sliderValue) {
          const ratio = sliderValue / SLIDER_RANGE;
          const hue = ratio * 360;
          this.hsl = { h: hue % 360, s: 100, l: 50 };
          const [r, g, b] = hslToRgb(this.hsl.h, this.hsl.s, this.hsl.l);
          this.rgb = { r, g, b };
          const [L] = rgbToLab(r, g, b);
          this.baseFrequency = getFrequencyFromLabL(L);
        }

        setupAudio() {
          this.osc = audioCtx.createOscillator();
          this.gain = audioCtx.createGain();
          this.osc.type = "sine";
          this.osc.frequency.value = this.baseFrequency;
          this.gain.gain.value = 0.05;
          this.osc.connect(this.gain);
          this.gain.connect(audioCtx.destination);
          this.osc.start();
        }

        draw(ctx) {
          ctx.fillStyle = `rgb(${this.rgb.r},${this.rgb.g},${this.rgb.b})`;
          ctx.globalAlpha = 0.8;
          ctx.fillRect(this.x, this.y, this.width, this.height);
          ctx.globalAlpha = 1;
          ctx.fillStyle = "white";
          ctx.font = "16px sans-serif";
          ctx.fillText(
            `${this.osc.frequency.value.toFixed(2)} Hz`,
            this.x + 5,
            this.y + 20
          );
          if (this.slider) {
            Object.assign(this.slider.style, {
              left: `${this.x}px`,
              top: `${this.y + this.height + 5}px`,
              width: `${this.width}px`,
            });
          }
        }

        contains(x, y) {
          return (
            x >= this.x &&
            x <= this.x + this.width &&
            y >= this.y &&
            y <= this.y + this.height
          );
        }

        toggleSlider() {
          if (this.slider) {
            document.body.removeChild(this.slider);
            this.slider = null;
          } else {
            const slider = document.createElement("input");
            slider.type = "range";
            slider.min = 0;
            slider.max = SLIDER_RANGE;
            slider.step = 0.1;
            slider.value = (this.hsl.h / 360) * SLIDER_RANGE;
            slider.className = "hue-slider";
            Object.assign(slider.style, {
              left: `${this.x}px`,
              top: `${this.y + this.height + 5}px`,
              width: `${this.width}px`,
            });
            slider.addEventListener("input", () => {
              const newHue = (slider.value / SLIDER_RANGE) * 360;
              this.hsl.h = newHue;
              const [r, g, b] = hslToRgb(newHue, this.hsl.s, this.hsl.l);
              this.rgb = { r, g, b };
              const [L] = rgbToLab(r, g, b);
              this.baseFrequency = getFrequencyFromLabL(L);
            });
            slider.addEventListener("mouseup", () => {
              setTimeout(() => {
                if (slider.parentNode) slider.parentNode.removeChild(slider);
                this.slider = null;
              }, SLIDER_REMOVAL_DELAY);
            });
            document.body.appendChild(slider);
            this.slider = slider;
          }
        }
      }
      Pane.idCounter = 0;

      // ---- Event Handlers ----
      function handleMouseDown(e) {
        if (audioCtx.state === "suspended") audioCtx.resume();
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for (let i = appState.panes.length - 1; i >= 0; i--) {
          const p = appState.panes[i];
          if (p.contains(x, y)) {
            if (
              x >= p.x + p.width - RESIZE_MARGIN &&
              y >= p.y + p.height - RESIZE_MARGIN
            ) {
              appState.selectedPane = p;
              appState.resizing = true;
              appState.resizeOffsetX = p.x + p.width - x;
              appState.resizeOffsetY = p.y + p.height - y;
            } else {
              appState.selectedPane = p;
              appState.isDragging = true;
              appState.dragOffsetX = x - p.x;
              appState.dragOffsetY = y - p.y;
            }
            appState.panes.splice(i, 1);
            appState.panes.push(p);
            break;
          }
        }
      }

      function handleMouseMove(e) {
        if (!appState.selectedPane) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (appState.resizing) {
          appState.selectedPane.width = Math.max(
            MIN_PANE_SIZE,
            x - appState.selectedPane.x + appState.resizeOffsetX
          );
          appState.selectedPane.height = Math.max(
            MIN_PANE_SIZE,
            y - appState.selectedPane.y + appState.resizeOffsetY
          );
        } else if (appState.isDragging) {
          appState.selectedPane.x = x - appState.dragOffsetX;
          appState.selectedPane.y = y - appState.dragOffsetY;
        }
      }

      function handleMouseUp() {
        appState.selectedPane = null;
        appState.isDragging = false;
        appState.resizing = false;
      }

      function handleMouseLeave() {
        appState.selectedPane = null;
        appState.isDragging = false;
        appState.resizing = false;
      }

      function handleDoubleClick(e) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        let p = appState.panes.find((p) => p.contains(x, y));
        if (p) {
          p.toggleSlider();
        } else {
          const rand = (min, max) => min + Math.random() * (max - min);
          let width = rand(MIN_PANE_WIDTH, MAX_PANE_WIDTH);
          let height = rand(MIN_PANE_HEIGHT, MAX_PANE_HEIGHT);
          let xPos = Math.min(x - width / 2, canvas.width - width);
          let yPos = Math.min(y - height / 2, canvas.height - height);
          appState.panes.push(
            new Pane(xPos, yPos, width, height, Math.random() * SLIDER_RANGE)
          );
        }
      }

      function handleContextMenu(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        for (let i = appState.panes.length - 1; i >= 0; i--) {
          const p = appState.panes[i];
          if (p.contains(x, y)) {
            if (p.slider) document.body.removeChild(p.slider);
            let t = audioCtx.currentTime;
            p.gain.gain.cancelScheduledValues(t);
            p.gain.gain.setValueAtTime(p.gain.gain.value, t);
            p.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
            setTimeout(() => {
              p.osc.stop();
              p.osc.disconnect();
              p.gain.disconnect();
            }, OSCILLATOR_STOP_DELAY);
            appState.panes.splice(i, 1);
            break;
          }
        }
      }

      function handleTouchStart(e) {
        e.preventDefault();
        if (audioCtx.state === "suspended") audioCtx.resume();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        appState.longPressTimeout = setTimeout(() => {
          let p = appState.panes.find((p) => p.contains(x, y));
          if (p) {
            if (p.slider) document.body.removeChild(p.slider);
            p.gain.gain.setValueAtTime(p.gain.gain.value, audioCtx.currentTime);
            p.gain.gain.exponentialRampToValueAtTime(
              0.0001,
              audioCtx.currentTime + 0.03
            );
            setTimeout(() => {
              p.osc.stop();
              p.osc.disconnect();
              p.gain.disconnect();
            }, 500);
            appState.panes.splice(appState.panes.indexOf(p), 1);
          }
        }, LONG_PRESS_DURATION);

        let p = appState.panes.find((p) => p.contains(x, y));
        if (p) {
          if (Date.now() - appState.lastTap < DOUBLE_CLICK_THRESHOLD) {
            clearTimeout(appState.tapTimeout);
            clearTimeout(appState.longPressTimeout);
            p.toggleSlider();
          } else {
            if (
              x >=
                p.x +
                  p.width -
                  RESIZE_MARGIN * TOUCH_RESIZE_MARGIN_MULTIPLIER &&
              y >=
                p.y + p.height - RESIZE_MARGIN * TOUCH_RESIZE_MARGIN_MULTIPLIER
            ) {
              appState.selectedPane = p;
              appState.resizing = true;
              appState.resizeOffsetX = p.x + p.width - x;
              appState.resizeOffsetY = p.y + p.height - y;
            } else {
              appState.selectedPane = p;
              appState.isDragging = true;
              appState.dragOffsetX = x - p.x;
              appState.dragOffsetY = y - p.y;
            }
          }
          appState.panes.splice(appState.panes.indexOf(p), 1);
          appState.panes.push(p);
        } else {
          if (Date.now() - appState.lastTap < DOUBLE_CLICK_THRESHOLD) {
            const rand = (min, max) => min + Math.random() * (max - min);
            let width = rand(90, 250);
            let height = rand(90, 250);
            let xPos = Math.min(x - width / 2, canvas.width - width);
            let yPos = Math.min(y - height / 2, canvas.height - height);
            appState.panes.push(
              new Pane(xPos, yPos, width, height, Math.random() * SLIDER_RANGE)
            );
          } else {
            appState.tapTimeout = setTimeout(() => {}, DOUBLE_CLICK_THRESHOLD);
          }
        }
        appState.lastTap = Date.now();
      }

      function handleTouchMove(e) {
        e.preventDefault();
        clearTimeout(appState.longPressTimeout);
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        if (appState.selectedPane) {
          if (appState.resizing) {
            appState.selectedPane.width = Math.max(
              MIN_PANE_SIZE,
              x - appState.selectedPane.x + appState.resizeOffsetX
            );
            appState.selectedPane.height = Math.max(
              MIN_PANE_SIZE,
              y - appState.selectedPane.y + appState.resizeOffsetY
            );
          } else if (appState.isDragging) {
            appState.selectedPane.x = x - appState.dragOffsetX;
            appState.selectedPane.y = y - appState.dragOffsetY;
          }
        }
      }

      function handleTouchEnd(e) {
        e.preventDefault();
        clearTimeout(appState.longPressTimeout);
        appState.selectedPane = null;
        appState.isDragging = false;
        appState.resizing = false;
      }

      // ---- Attach Event Listeners ----
      canvas.addEventListener("mousedown", handleMouseDown);
      canvas.addEventListener("mousemove", handleMouseMove);
      canvas.addEventListener("mouseup", handleMouseUp);
      canvas.addEventListener("mouseleave", handleMouseLeave);
      canvas.addEventListener("dblclick", handleDoubleClick);
      canvas.addEventListener("contextmenu", handleContextMenu);
      canvas.addEventListener("touchstart", handleTouchStart, {
        passive: false,
      });
      canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
      canvas.addEventListener("touchend", handleTouchEnd, { passive: false });

      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "lighter";
        const t = audioCtx.currentTime;
        let indiv = {};
        appState.panes.forEach((p) => (indiv[p.id] = 0));
        let compRegions = {};
        for (let i = 0; i < GRID_COLUMNS; i++) {
          for (let j = 0; j < GRID_ROWS; j++) {
            const sampleX = (i + 0.5) * cellWidth,
              sampleY = (j + 0.5) * cellHeight;
            const covering = appState.panes.filter(
              (p) =>
                sampleX >= p.x &&
                sampleX <= p.x + p.width &&
                sampleY >= p.y &&
                sampleY <= p.y + p.height
            );
            if (covering.length === 1) indiv[covering[0].id] += cellArea;
            else if (covering.length >= 2) {
              let key = covering
                .map((p) => p.id)
                .sort((a, b) => a - b)
                .join(",");
              if (!compRegions[key])
                compRegions[key] = {
                  area: 0,
                  sumX: 0,
                  sumY: 0,
                  sumR: 0,
                  sumG: 0,
                  sumB: 0,
                };
              let r = 0,
                g = 0,
                b = 0;
              covering.forEach((p) => {
                r = screenChannel(r, p.rgb.r / 255);
                g = screenChannel(g, p.rgb.g / 255);
                b = screenChannel(b, p.rgb.b / 255);
              });
              compRegions[key].area += cellArea;
              compRegions[key].sumX += sampleX * cellArea;
              compRegions[key].sumY += sampleY * cellArea;
              compRegions[key].sumR += r * 255 * cellArea;
              compRegions[key].sumG += g * 255 * cellArea;
              compRegions[key].sumB += b * 255 * cellArea;
            }
          }
        }
        appState.panes.forEach((p) => {
          let vol = Math.min(0.05 * (indiv[p.id] / REF_AREA), 0.2);
          p.gain.gain.setTargetAtTime(vol, t, 0.05);
          p.osc.frequency.setTargetAtTime(p.baseFrequency, t, 0.05);
          p.draw(ctx, indiv[p.id]);
        });
        for (let key in compRegions) {
          const region = compRegions[key],
            area = region.area;
          const avgR = region.sumR / area,
            avgG = region.sumG / area,
            avgB = region.sumB / area;
          const [L] = rgbToLab(avgR, avgG, avgB);
          const compFreq = getFrequencyFromLabL(L);
          const compVol = Math.min(0.05 * (area / REF_AREA), 0.2);
          if (!appState.compositeOscillators[key]) {
            const osc = audioCtx.createOscillator(),
              gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = compFreq;
            gain.gain.value = 0.0001;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.cancelScheduledValues(t);
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.exponentialRampToValueAtTime(compVol, t + 0.05);
            appState.compositeOscillators[key] = { osc, gain };
          } else {
            let c = appState.compositeOscillators[key];
            c.osc.frequency.setTargetAtTime(compFreq, t, 0.05);
            c.gain.gain.setTargetAtTime(compVol, t, 0.05);
          }
          const centroidX = region.sumX / area,
            centroidY = region.sumY / area;
          ctx.fillStyle = "white";
          ctx.font = "16px sans-serif";
          ctx.fillText(compFreq.toFixed(2) + " Hz", centroidX - 30, centroidY);
        }
        for (let key in appState.compositeOscillators) {
          if (!(key in compRegions)) {
            let c = appState.compositeOscillators[key];
            c.gain.gain.cancelScheduledValues(t);
            c.gain.gain.setValueAtTime(Math.max(0.0001, c.gain.gain.value), t);
            c.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
            setTimeout(() => {
              c.osc.stop();
              c.osc.disconnect();
              c.gain.disconnect();
              delete appState.compositeOscillators[key];
            }, OSCILLATOR_STOP_DELAY);
          }
        }
      }
      animate();

      // ---- Utility Functions ----
      const getFrequencyFromLabL = (L) => 100 + ((L - 30) / 60) * 900;
      function hslToRgb(h, s, l) {
        s /= 100;
        l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s,
          x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
          m = l - c / 2;
        let r, g, b;
        if (h < 60) [r, g, b] = [c, x, 0];
        else if (h < 120) [r, g, b] = [x, c, 0];
        else if (h < 180) [r, g, b] = [0, c, x];
        else if (h < 240) [r, g, b] = [0, x, c];
        else if (h < 300) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        return [
          Math.round((r + m) * 255),
          Math.round((g + m) * 255),
          Math.round((b + m) * 255),
        ];
      }
      function rgbToLab(r, g, b) {
        [r, g, b] = [r, g, b].map((v) => v / 255);
        r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
        const x = r * 0.4124564 + g * 0.3575761 + b * 0.1804375,
          y = r * 0.2126729 + g * 0.7151522 + b * 0.072175,
          z = r * 0.0193339 + g * 0.119192 + b * 0.9503041,
          xn = 0.95047,
          yn = 1,
          zn = 1.08883;
        const fx =
            x > 0.008856
              ? Math.pow(x / xn, 1 / 3)
              : (7.787 * x) / xn + 16 / 116,
          fy =
            y > 0.008856
              ? Math.pow(y / yn, 1 / 3)
              : (7.787 * y) / yn + 16 / 116,
          fz =
            z > 0.008856
              ? Math.pow(z / zn, 1 / 3)
              : (7.787 * z) / zn + 16 / 116;
        return [116 * fy - 16, 500 * (fx - fy), 200 * (fy - fz)];
      }
      const screenChannel = (a, b) => 1 - (1 - a) * (1 - b);
    </script>
  </body>
</html>
