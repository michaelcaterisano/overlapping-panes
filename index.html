<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overlapping Panes</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
      }
      canvas {
        display: block;
        position: relative;
        z-index: 100;
      }
      .hue-slider {
        position: absolute;
        z-index: 200;
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: #ddd;
        outline: none;
        border-radius: 4px;
      }
      .hue-slider::-webkit-slider-thumb,
      .hue-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #fff;
        border: 2px solid #888;
        border-radius: 50%;
        cursor: pointer;
      }
      @media (any-pointer: coarse) {
        .hue-slider {
          height: 24px;
        }
        .hue-slider::-webkit-slider-thumb,
        .hue-slider::-moz-range-thumb {
          width: 32px;
          height: 32px;
        }
      }
      #palette {
        position: absolute;
        top: 10px;
        left: 10px;
        display: flex;
        gap: 6px;
        z-index: 300;
        padding: 4px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 8px;
      }
      .swatch {
        width: 30px;
        height: 30px;
        border: 2px solid white;
        border-radius: 4px;
        cursor: pointer;
      }
      #composite-palette {
        position: absolute;
        top: 50px;
        left: 10px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        z-index: 300;
        padding: 4px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        max-width: 90vw;
      }
    </style>
  </head>
  <body>
    <div id="palette"></div>
    <div id="composite-palette"></div>
    <canvas id="canvas"></canvas>
    <script type="module">
      // Import pure functions from utils.js
      import { hslToRgb, rgbToLab, rgbToHsl, screenChannel, getFrequencyFromLabL } from "./utils.js";

      // ---- Global Constants & Variables ----
      const mappingPresets = [{ H_low: 240, H_high: 600 }];
      const randomMapping = () => mappingPresets[Math.floor(Math.random() * mappingPresets.length)];
      const sliderRange = 800;
      const resizeMargin = 30;

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      let cellWidth = canvas.width / 50,
          cellHeight = canvas.height / 50,
          cellArea = cellWidth * cellHeight;
      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cellWidth = canvas.width / 50;
        cellHeight = canvas.height / 50;
        cellArea = cellWidth * cellHeight;
      });

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      // "Last" variables declared once.
      let lastCompositeUpdate = 0;
      let lastCompositeRegions = {};
      let lastTap = 0;

      // ---- Pane Class ----
      // Optionally accepts an override for HSL (used when clicking a composite swatch)
      class Pane {
        constructor(x, y, width, height, mapping, sliderValue, overrideHSL) {
          this.id = Pane.idCounter++;
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
          this.mapping = mapping;
          if (overrideHSL) {
            this.hsl = { ...overrideHSL };
          } else {
            const ratio = sliderValue / sliderRange;
            const hue = mapping.H_low + ratio * (mapping.H_high - mapping.H_low);
            this.hsl = { h: hue % 360, s: 100, l: 50 };
          }
          const [r, g, b] = hslToRgb(this.hsl.h, this.hsl.s, this.hsl.l);
          this.rgb = { r, g, b };
          const [L] = rgbToLab(r, g, b);
          this.baseFrequency = getFrequencyFromLabL(L);
          this.osc = audioCtx.createOscillator();
          this.gain = audioCtx.createGain();
          this.osc.type = "sine";
          this.osc.frequency.value = this.baseFrequency;
          this.gain.gain.value = 0.05;
          this.osc.connect(this.gain);
          this.gain.connect(audioCtx.destination);
          this.osc.start();
          this.slider = null;
        }
        draw(ctx, vol = 1) {
          ctx.fillStyle = `rgb(${this.rgb.r},${this.rgb.g},${this.rgb.b})`;
          ctx.globalAlpha = 0.8;
          ctx.fillRect(this.x, this.y, this.width, this.height);
          ctx.globalAlpha = 1;
          ctx.fillStyle = "white";
          ctx.font = "16px sans-serif";
          ctx.fillText(this.osc.frequency.value.toFixed(2) + " Hz", this.x + 5, this.y + 20);
          if (this.slider) {
            this.slider.style.left = this.x + "px";
            this.slider.style.top = (this.y + this.height + 5) + "px";
            this.slider.style.width = this.width + "px";
          }
        }
        contains(x, y) {
          return x >= this.x && x <= this.x + this.width && y >= this.y && y <= this.y + this.height;
        }
        toggleSlider() {
          if (this.slider) {
            document.body.removeChild(this.slider);
            this.slider = null;
          } else {
            const slider = document.createElement("input");
            slider.type = "range";
            slider.min = 0;
            slider.max = sliderRange;
            slider.step = 0.1;
            let currentHue = this.hsl.h;
            if (currentHue < this.mapping.H_low) currentHue += 360;
            slider.value = ((currentHue - this.mapping.H_low) / (this.mapping.H_high - this.mapping.H_low)) * sliderRange;
            slider.className = "hue-slider";
            slider.style.left = this.x + "px";
            slider.style.top = (this.y + this.height + 5) + "px";
            slider.style.width = this.width + "px";
            slider.addEventListener("input", () => {
              const newHue = (this.mapping.H_low + (slider.value / sliderRange) * (this.mapping.H_high - this.mapping.H_low)) % 360;
              this.hsl.h = newHue;
              const [r, g, b] = hslToRgb(newHue, this.hsl.s, this.hsl.l);
              this.rgb = { r, g, b };
              const [L] = rgbToLab(r, g, b);
              this.baseFrequency = getFrequencyFromLabL(L);
            });
            ["mouseup", "touchend"].forEach(evt => {
              slider.addEventListener(evt, () =>
                setTimeout(() => {
                  if (slider.parentNode) slider.parentNode.removeChild(slider);
                  this.slider = null;
                }, 500)
              );
            });
            document.body.appendChild(slider);
            this.slider = slider;
          }
        }
      }
      Pane.idCounter = 0;

      // ---- Global Variables for Panes ----
      let panes = [],
          selectedPane = null,
          isDragging = false,
          dragOffsetX = 0,
          dragOffsetY = 0,
          resizing = false,
          resizeOffsetX = 0,
          resizeOffsetY = 0;
      let editingPane = null;

      // ---- Palette Setup ----
      const beautifulHues = [240, 275, 300, 330, 0, 30, 60, 90, 150, 180, 210, 240];
      const paletteDiv = document.getElementById("palette");
      beautifulHues.forEach((hue) => {
        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
        swatch.dataset.hue = hue;
        paletteDiv.appendChild(swatch);
      });
      document.querySelectorAll(".swatch").forEach((swatch) => {
        swatch.addEventListener("click", () => {
          const hue = parseInt(swatch.dataset.hue);
          const mapping = mappingPresets[0];
          let adjustedHue = hue < mapping.H_low ? hue + 360 : hue;
          const sliderValue = ((adjustedHue - mapping.H_low) / (mapping.H_high - mapping.H_low)) * sliderRange;
          const x = Math.random() * (canvas.width - 200);
          const y = Math.random() * (canvas.height - 200);
          panes.push(new Pane(x, y, 200, 200, mapping, sliderValue));
        });
      });

      // ---- Composite Palette Update (Throttled) ----
      function updateCompositePalette(compRegions) {
        const compositePalette = document.getElementById("composite-palette");
        compositePalette.innerHTML = ""; // Clear old swatches
        for (let key in compRegions) {
          const region = compRegions[key],
                area = region.area;
          const avgR = region.sumR / area,
                avgG = region.sumG / area,
                avgB = region.sumB / area;
          const [compHue, compS, compL] = rgbToHsl(avgR, avgG, avgB);
          const compFreq = getFrequencyFromLabL(compL);
          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.style.backgroundColor = `rgb(${Math.round(avgR)}, ${Math.round(avgG)}, ${Math.round(avgB)})`;
          swatch.title = `${compFreq.toFixed(2)} Hz`;
          swatch.addEventListener("click", () => {
            const mapping = mappingPresets[0];
            let adjustedHue = compHue < mapping.H_low ? compHue + 360 : compHue;
            const sliderValue = ((adjustedHue - mapping.H_low) / (mapping.H_high - mapping.H_low)) * sliderRange;
            const x = Math.random() * (canvas.width - 200);
            const y = Math.random() * (canvas.height - 200);
            panes.push(new Pane(x, y, 200, 200, mapping, sliderValue, { h: compHue, s: compS, l: compL }));
          });
          compositePalette.appendChild(swatch);
        }
      }
      setInterval(() => {
        updateCompositePalette(lastCompositeRegions);
      }, 500);

      // ---- Mouse Event Listeners ----
      canvas.addEventListener("mousedown", (e) => {
        if (audioCtx.state === "suspended") audioCtx.resume();
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const overlapping = panes.filter(p => p.contains(x, y));
        if (overlapping.length > 0) {
          selectedPane = overlapping[overlapping.length - 1];
          if (x >= selectedPane.x + selectedPane.width - resizeMargin &&
              y >= selectedPane.y + selectedPane.height - resizeMargin) {
            resizing = true;
            resizeOffsetX = selectedPane.x + selectedPane.width - x;
            resizeOffsetY = selectedPane.y + selectedPane.height - y;
          } else {
            isDragging = true;
            dragOffsetX = x - selectedPane.x;
            dragOffsetY = y - selectedPane.y;
          }
          const idx = panes.indexOf(selectedPane);
          if (idx !== -1) {
            panes.splice(idx, 1);
            panes.push(selectedPane);
          }
        }
      });
      canvas.addEventListener("mousemove", (e) => {
        if (!selectedPane) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        if (resizing) {
          selectedPane.width = Math.max(50, x - selectedPane.x + resizeOffsetX);
          selectedPane.height = Math.max(50, y - selectedPane.y + resizeOffsetY);
        } else if (isDragging) {
          selectedPane.x = x - dragOffsetX;
          selectedPane.y = y - dragOffsetY;
        }
      });
      canvas.addEventListener("mouseup", () => {
        selectedPane = null;
        isDragging = false;
        resizing = false;
      });
      canvas.addEventListener("mouseleave", () => {
        selectedPane = null;
        isDragging = false;
        resizing = false;
      });
      canvas.addEventListener("dblclick", (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        let p = panes.find(p => p.contains(x, y));
        if (p) {
          p.toggleSlider();
        } else {
          const rand = (min, max) => min + Math.random() * (max - min);
          let width = rand(100, 300);
          let height = rand(100, 300);
          let xPos = Math.min(x - width / 2, canvas.width - width);
          let yPos = Math.min(y - height / 2, canvas.height - height);
          panes.push(new Pane(xPos, yPos, width, height, randomMapping(), Math.random() * sliderRange));
        }
      });
      canvas.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        for (let i = panes.length - 1; i >= 0; i--) {
          const p = panes[i];
          if (p.contains(x, y)) {
            if (p.slider) document.body.removeChild(p.slider);
            const t = audioCtx.currentTime;
            p.gain.gain.cancelScheduledValues(t);
            p.gain.gain.setValueAtTime(p.gain.gain.value, t);
            p.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
            setTimeout(() => {
              p.osc.stop();
              p.osc.disconnect();
              p.gain.disconnect();
            }, 60);
            panes.splice(i, 1);
            break;
          }
        }
      });

      // ---- Touch Event Listeners ----
      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (audioCtx.state === "suspended") audioCtx.resume();
        const touch = e.touches[0],
              rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        let p = panes.find(p => p.contains(x, y));
        if (p) {
          longPressTimeout = setTimeout(() => {
            if (p.slider) document.body.removeChild(p.slider);
            p.gain.gain.setValueAtTime(p.gain.gain.value, audioCtx.currentTime);
            p.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
            setTimeout(() => {
              p.osc.stop();
              p.osc.disconnect();
              p.gain.disconnect();
            }, 500);
            panes.splice(panes.indexOf(p), 1);
          }, 800);
        } else {
          clearTimeout(longPressTimeout);
        }
        if (p) {
          if (Date.now() - lastTap < 300) {
            clearTimeout(tapTimeout);
            clearTimeout(longPressTimeout);
            p.toggleSlider();
          } else {
            if (x >= p.x + p.width - resizeMargin * 2 && y >= p.y + p.height - resizeMargin * 2) {
              selectedPane = p;
              resizing = true;
              resizeOffsetX = p.x + p.width - x;
              resizeOffsetY = p.y + p.height - y;
            } else {
              selectedPane = p;
              isDragging = true;
              dragOffsetX = x - p.x;
              dragOffsetY = y - p.y;
            }
            const idx = panes.indexOf(p);
            if (idx !== -1) {
              panes.splice(idx, 1);
              panes.push(p);
            }
          }
        } else {
          if (Date.now() - lastTap < 300) {
            panes.push(new Pane(x - 100, y - 100, 200, 200, randomMapping(), Math.random() * sliderRange));
          } else {
            tapTimeout = setTimeout(() => {}, 300);
          }
        }
        lastTap = Date.now();
      }, { passive: false });
      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        clearTimeout(longPressTimeout);
        const touch = e.touches[0],
              rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        if (selectedPane) {
          if (resizing) {
            selectedPane.width = Math.max(50, x - selectedPane.x + resizeOffsetX);
            selectedPane.height = Math.max(50, y - selectedPane.y + resizeOffsetY);
          } else if (isDragging) {
            selectedPane.x = x - dragOffsetX;
            selectedPane.y = y - dragOffsetY;
          }
        }
      }, { passive: false });
      canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        clearTimeout(longPressTimeout);
        selectedPane = null;
        isDragging = false;
        resizing = false;
      }, { passive: false });

      // ---- Animation Loop ----
      let compositeOscillators = {};
      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "lighter";
        const t = audioCtx.currentTime;
        let indiv = {};
        panes.forEach(p => (indiv[p.id] = 0));
        let compRegions = {};
        for (let i = 0; i < 50; i++) {
          for (let j = 0; j < 50; j++) {
            const sampleX = (i + 0.5) * cellWidth;
            const sampleY = (j + 0.5) * cellHeight;
            const covering = panes.filter(p =>
              sampleX >= p.x && sampleX <= p.x + p.width &&
              sampleY >= p.y && sampleY <= p.y + p.height
            );
            if (covering.length === 1)
              indiv[covering[0].id] += cellArea;
            else if (covering.length >= 2) {
              let key = covering.map(p => p.id).sort((a, b) => a - b).join(",");
              if (!compRegions[key])
                compRegions[key] = { area: 0, sumX: 0, sumY: 0, sumR: 0, sumG: 0, sumB: 0 };
              let r = 0, g = 0, b = 0;
              covering.forEach(p => {
                r = screenChannel(r, p.rgb.r / 255);
                g = screenChannel(g, p.rgb.g / 255);
                b = screenChannel(b, p.rgb.b / 255);
              });
              compRegions[key].area += cellArea;
              compRegions[key].sumX += sampleX * cellArea;
              compRegions[key].sumY += sampleY * cellArea;
              compRegions[key].sumR += r * 255 * cellArea;
              compRegions[key].sumG += g * 255 * cellArea;
              compRegions[key].sumB += b * 255 * cellArea;
            }
          }
        }
        lastCompositeRegions = compRegions; // Cache composite regions

        const refArea = 30000;
        panes.forEach(p => {
          let vol = Math.min(0.05 * (indiv[p.id] / refArea), 0.2);
          p.gain.gain.setTargetAtTime(vol, t, 0.05);
          p.osc.frequency.setTargetAtTime(p.baseFrequency, t, 0.05);
          p.draw(ctx, indiv[p.id]);
        });

        // Composite oscillators (sound blending)
        for (let key in compRegions) {
          const region = compRegions[key],
                area = region.area;
          const avgR = region.sumR / area,
                avgG = region.sumG / area,
                avgB = region.sumB / area;
          const [L] = rgbToLab(avgR, avgG, avgB);
          const compFreq = getFrequencyFromLabL(L);
          const compVol = Math.min(0.05 * (area / refArea), 0.2);
          if (!compositeOscillators[key]) {
            const osc = audioCtx.createOscillator(),
                  gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = compFreq;
            gain.gain.value = 0.0001;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.cancelScheduledValues(t);
            gain.gain.setValueAtTime(0.0001, t);
            gain.gain.exponentialRampToValueAtTime(compVol, t + 0.05);
            compositeOscillators[key] = { osc, gain };
          } else {
            let c = compositeOscillators[key];
            c.osc.frequency.setTargetAtTime(compFreq, t, 0.05);
            c.gain.gain.setTargetAtTime(compVol, t, 0.05);
          }
        }
        for (let key in compositeOscillators) {
          if (!(key in compRegions)) {
            let c = compositeOscillators[key];
            c.gain.gain.cancelScheduledValues(t);
            c.gain.gain.setValueAtTime(Math.max(0.0001, c.gain.gain.value), t);
            c.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
            setTimeout(() => {
              c.osc.stop();
              c.osc.disconnect();
              c.gain.disconnect();
              delete compositeOscillators[key];
            }, 60);
          }
        }

        // Perfect Fifth Detection
        const perfectFifth = 1.5, tolerance = 0.01;
        for (let i = 0; i < panes.length; i++) {
          for (let j = i + 1; j < panes.length; j++) {
            const f1 = panes[i].osc.frequency.value,
                  f2 = panes[j].osc.frequency.value,
                  ratio = Math.max(f1, f2) / Math.min(f1, f2);
            if (Math.abs(ratio - perfectFifth) < tolerance) {
              const x1 = panes[i].x + panes[i].width / 2,
                    y1 = panes[i].y + panes[i].height / 2,
                    x2 = panes[j].x + panes[j].width / 2,
                    y2 = panes[j].y + panes[j].height / 2;
              ctx.strokeStyle = "white";
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(x1, y1);
              ctx.lineTo(x2, y2);
              ctx.stroke();
            }
          }
        }
      }
      animate();

      // ---- Touch Event Listeners ----
      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (audioCtx.state === "suspended") audioCtx.resume();
        const touch = e.touches[0],
              rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        let p = panes.find(p => p.contains(x, y));
        if (p) {
          longPressTimeout = setTimeout(() => {
            if (p.slider) document.body.removeChild(p.slider);
            p.gain.gain.setValueAtTime(p.gain.gain.value, audioCtx.currentTime);
            p.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
            setTimeout(() => {
              p.osc.stop();
              p.osc.disconnect();
              p.gain.disconnect();
            }, 500);
            panes.splice(panes.indexOf(p), 1);
          }, 800);
        } else {
          clearTimeout(longPressTimeout);
        }
        if (p) {
          if (Date.now() - lastTap < 300) {
            clearTimeout(tapTimeout);
            clearTimeout(longPressTimeout);
            p.toggleSlider();
          } else {
            if (x >= p.x + p.width - resizeMargin * 2 && y >= p.y + p.height - resizeMargin * 2) {
              selectedPane = p;
              resizing = true;
              resizeOffsetX = p.x + p.width - x;
              resizeOffsetY = p.y + p.height - y;
            } else {
              selectedPane = p;
              isDragging = true;
              dragOffsetX = x - p.x;
              dragOffsetY = y - p.y;
            }
            const idx = panes.indexOf(p);
            if (idx !== -1) {
              panes.splice(idx, 1);
              panes.push(p);
            }
          }
        } else {
          if (Date.now() - lastTap < 300) {
            panes.push(new Pane(x - 100, y - 100, 200, 200, randomMapping(), Math.random() * sliderRange));
          } else {
            tapTimeout = setTimeout(() => {}, 300);
          }
        }
        lastTap = Date.now();
      }, { passive: false });
      canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        clearTimeout(longPressTimeout);
        const touch = e.touches[0],
              rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        if (selectedPane) {
          if (resizing) {
            selectedPane.width = Math.max(50, x - selectedPane.x + resizeOffsetX);
            selectedPane.height = Math.max(50, y - selectedPane.y + resizeOffsetY);
          } else if (isDragging) {
            selectedPane.x = x - dragOffsetX;
            selectedPane.y = y - dragOffsetY;
          }
        }
      }, { passive: false });
      canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        clearTimeout(longPressTimeout);
        selectedPane = null;
        isDragging = false;
        resizing = false;
      }, { passive: false });
    </script>
  </body>
</html>
