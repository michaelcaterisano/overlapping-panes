<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overlapping Panes</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
      }
      canvas {
        display: block;
        position: relative;
        z-index: 100;
      }
      .hue-slider {
        position: absolute;
        z-index: 200;
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: #ddd;
        outline: none;
        border-radius: 4px;
      }
      .hue-slider::-webkit-slider-thumb,
      .hue-slider::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #fff;
        border: 2px solid #888;
        border-radius: 50%;
        cursor: pointer;
      }
      @media (any-pointer: coarse) {
        .hue-slider {
          height: 24px;
        }
        .hue-slider::-webkit-slider-thumb,
        .hue-slider::-moz-range-thumb {
          width: 32px;
          height: 32px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script>
      // ---- Global Constants ----
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const RESIZE_MARGIN = 30;
      const SLIDER_RANGE = 800;
      const MIN_PANE_SIZE = 50;
      const MAX_PANE_WIDTH = 300;
      const MAX_PANE_HEIGHT = 300;
      const MIN_PANE_WIDTH = 100;
      const MIN_PANE_HEIGHT = 100;
      const GRID_COLUMNS = 50;
      const GRID_ROWS = 50;
      const REF_AREA = 30000;
      const LONG_PRESS_DURATION = 800;
      const DOUBLE_CLICK_THRESHOLD = 300;
      const TOUCH_RESIZE_MARGIN_MULTIPLIER = 2;
      const SLIDER_REMOVAL_DELAY = 500;
      const OSCILLATOR_STOP_DELAY = 60;

      let cellArea;
      let cellHeight;
      let cellWidth;

      // ---- Application State ----
      const appState = {
        selectedPane: null,
        isDragging: false,
        isResizing: false,
        dragOffsetX: 0,
        dragOffsetY: 0,
        resizeOffsetX: 0,
        resizeOffsetY: 0,
        lastTapTime: 0,
        tapTimeout: null,
        longPressTimeout: null,
        panes: [],
        compositeOscillators: {},
      };

      // Resize handler to update canvas dimensions and dependent variables
      function handleResize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cellWidth = canvas.width / GRID_COLUMNS;
        cellHeight = canvas.height / GRID_ROWS;
        cellArea = cellWidth * cellHeight;
      }

      // Attach the resize handler and call it immediately
      window.addEventListener("resize", handleResize);
      handleResize();

      // ---- Pane Class ----
      class Pane {
        constructor(x, y, width, height, sliderValue) {
          this.id = Pane.idCounter++;
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
          this.slider = null;
          this.setColorAndFrequency(sliderValue);
          this.setupAudio();
        }

        setColorAndFrequency(sliderValue) {
          const ratio = sliderValue / SLIDER_RANGE;
          const hue = ratio * 360;
          this.hsl = { h: hue % 360, s: 100, l: 50 };
          const [r, g, b] = hslToRgb(this.hsl.h, this.hsl.s, this.hsl.l);
          this.rgb = { r, g, b };
          const [L] = rgbToLab(r, g, b);
          this.baseFrequency = getFrequencyFromLabL(L);
        }

        setupAudio() {
          this.osc = audioCtx.createOscillator();
          this.gain = audioCtx.createGain();
          this.osc.type = "sine";
          this.osc.frequency.value = this.baseFrequency;
          this.gain.gain.value = 0.05;
          this.osc.connect(this.gain);
          this.gain.connect(audioCtx.destination);
          this.osc.start();
        }

        draw(ctx) {
          ctx.fillStyle = `rgb(${this.rgb.r},${this.rgb.g},${this.rgb.b})`;
          ctx.globalAlpha = 0.8;
          ctx.fillRect(this.x, this.y, this.width, this.height);
          ctx.globalAlpha = 1;
          if (this.slider) {
            Object.assign(this.slider.style, {
              left: `${this.x}px`,
              top: `${this.y + this.height + 5}px`,
              width: `${this.width}px`,
            });
          }
        }

        contains(x, y) {
          return (
            x >= this.x &&
            x <= this.x + this.width &&
            y >= this.y &&
            y <= this.y + this.height
          );
        }

        toggleSlider() {
          if (this.slider) {
            document.body.removeChild(this.slider);
            this.slider = null;
          } else {
            const slider = document.createElement("input");
            slider.type = "range";
            slider.min = 0;
            slider.max = SLIDER_RANGE;
            slider.step = 0.1;
            slider.value = (this.hsl.h / 360) * SLIDER_RANGE;
            slider.className = "hue-slider";
            Object.assign(slider.style, {
              left: `${this.x}px`,
              top: `${this.y + this.height + 5}px`,
              width: `${this.width}px`,
            });
            slider.addEventListener("input", () => {
              const newHue = (slider.value / SLIDER_RANGE) * 360;
              this.hsl.h = newHue;
              const [r, g, b] = hslToRgb(newHue, this.hsl.s, this.hsl.l);
              this.rgb = { r, g, b };
              const [L] = rgbToLab(r, g, b);
              this.baseFrequency = getFrequencyFromLabL(L);
            });
            slider.addEventListener("mouseup", () => {
              setTimeout(() => {
                if (slider.parentNode) slider.parentNode.removeChild(slider);
                this.slider = null;
              }, SLIDER_REMOVAL_DELAY);
            });
            document.body.appendChild(slider);
            this.slider = slider;
          }
        }
      }
      Pane.idCounter = 0;

      // ---- Utility Functions ----
      function getCanvasCoordinates(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top,
        };
      }

      function findPaneAtCoordinates(x, y) {
        return appState.panes.find((pane) => pane.contains(x, y));
      }

      function createRandomPane(x, y) {
        const randomSize = (min, max) => min + Math.random() * (max - min);
        const width = randomSize(MIN_PANE_WIDTH, MAX_PANE_WIDTH);
        const height = randomSize(MIN_PANE_HEIGHT, MAX_PANE_HEIGHT);
        const xPos = Math.min(x - width / 2, canvas.width - width);
        const yPos = Math.min(y - height / 2, canvas.height - height);
        return new Pane(
          xPos,
          yPos,
          width,
          height,
          Math.random() * SLIDER_RANGE
        );
      }

      // ---- Event Handlers ----
      function handleMouseDown(event) {
        if (audioCtx.state === "suspended") audioCtx.resume();
        const { x, y } = getCanvasCoordinates(event);

        for (let i = appState.panes.length - 1; i >= 0; i--) {
          const pane = appState.panes[i];
          if (pane.contains(x, y)) {
            if (
              x >= pane.x + pane.width - RESIZE_MARGIN &&
              y >= pane.y + pane.height - RESIZE_MARGIN
            ) {
              appState.selectedPane = pane;
              appState.isResizing = true;
              appState.resizeOffsetX = pane.x + pane.width - x;
              appState.resizeOffsetY = pane.y + pane.height - y;
            } else {
              appState.selectedPane = pane;
              appState.isDragging = true;
              appState.dragOffsetX = x - pane.x;
              appState.dragOffsetY = y - pane.y;
            }
            appState.panes.splice(i, 1);
            appState.panes.push(pane); // Bring the selected pane to the front
            return;
          }
        }
      }

      function handleMouseMove(event) {
        if (!appState.selectedPane) return;
        const { x, y } = getCanvasCoordinates(event);

        if (appState.isResizing) {
          appState.selectedPane.width = Math.max(
            MIN_PANE_SIZE,
            x - appState.selectedPane.x + appState.resizeOffsetX
          );
          appState.selectedPane.height = Math.max(
            MIN_PANE_SIZE,
            y - appState.selectedPane.y + appState.resizeOffsetY
          );
        } else if (appState.isDragging) {
          appState.selectedPane.x = x - appState.dragOffsetX;
          appState.selectedPane.y = y - appState.dragOffsetY;
        }
      }

      function handleMouseUp() {
        appState.selectedPane = null;
        appState.isDragging = false;
        appState.isResizing = false;
      }

      function handleMouseLeave() {
        appState.selectedPane = null;
        appState.isDragging = false;
        appState.isResizing = false;
      }

      function handleDoubleClick(event) {
        const { x, y } = getCanvasCoordinates(event);
        const pane = findPaneAtCoordinates(x, y);

        if (pane) {
          pane.toggleSlider();
        } else {
          appState.panes.push(createRandomPane(x, y));
        }
      }

      function handleContextMenu(event) {
        event.preventDefault();
        const { x, y } = getCanvasCoordinates(event);
        const pane = findPaneAtCoordinates(x, y);

        if (pane) {
          if (pane.slider) document.body.removeChild(pane.slider);
          const currentTime = audioCtx.currentTime;
          pane.gain.gain.cancelScheduledValues(currentTime);
          pane.gain.gain.setValueAtTime(pane.gain.gain.value, currentTime);
          pane.gain.gain.exponentialRampToValueAtTime(
            0.0001,
            currentTime + 0.05
          );
          setTimeout(() => {
            pane.osc.stop();
            pane.osc.disconnect();
            pane.gain.disconnect();
          }, OSCILLATOR_STOP_DELAY);
          appState.panes.splice(appState.panes.indexOf(pane), 1);
        }
      }

      function handleTouchStart(e) {
        e.preventDefault();
        if (audioCtx.state === "suspended") audioCtx.resume();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        appState.longPressTimeout = setTimeout(() => {
          let p = appState.panes.find((p) => p.contains(x, y));
          if (p) {
            if (p.slider) document.body.removeChild(p.slider);
            p.gain.gain.setValueAtTime(p.gain.gain.value, audioCtx.currentTime);
            p.gain.gain.exponentialRampToValueAtTime(
              0.0001,
              audioCtx.currentTime + 0.03
            );
            setTimeout(() => {
              p.osc.stop();
              p.osc.disconnect();
              p.gain.disconnect();
            }, 500);
            appState.panes.splice(appState.panes.indexOf(p), 1);
          }
        }, LONG_PRESS_DURATION);

        let p = appState.panes.find((p) => p.contains(x, y));
        if (p) {
          if (Date.now() - appState.lastTap < DOUBLE_CLICK_THRESHOLD) {
            clearTimeout(appState.tapTimeout);
            clearTimeout(appState.longPressTimeout);
            p.toggleSlider();
          } else {
            if (
              x >=
                p.x +
                  p.width -
                  RESIZE_MARGIN * TOUCH_RESIZE_MARGIN_MULTIPLIER &&
              y >=
                p.y + p.height - RESIZE_MARGIN * TOUCH_RESIZE_MARGIN_MULTIPLIER
            ) {
              appState.selectedPane = p;
              appState.resizing = true;
              appState.resizeOffsetX = p.x + p.width - x;
              appState.resizeOffsetY = p.y + p.height - y;
            } else {
              appState.selectedPane = p;
              appState.isDragging = true;
              appState.dragOffsetX = x - p.x;
              appState.dragOffsetY = y - p.y;
            }
          }
          appState.panes.splice(appState.panes.indexOf(p), 1);
          appState.panes.push(p);
        } else {
          if (Date.now() - appState.lastTap < DOUBLE_CLICK_THRESHOLD) {
            const rand = (min, max) => min + Math.random() * (max - min);
            let width = rand(90, 250);
            let height = rand(90, 250);
            let xPos = Math.min(x - width / 2, canvas.width - width);
            let yPos = Math.min(y - height / 2, canvas.height - height);
            appState.panes.push(
              new Pane(xPos, yPos, width, height, Math.random() * SLIDER_RANGE)
            );
          } else {
            appState.tapTimeout = setTimeout(() => {}, DOUBLE_CLICK_THRESHOLD);
          }
        }
        appState.lastTap = Date.now();
      }

      function handleTouchMove(e) {
        e.preventDefault();
        clearTimeout(appState.longPressTimeout);
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;

        if (appState.selectedPane) {
          if (appState.resizing) {
            appState.selectedPane.width = Math.max(
              MIN_PANE_SIZE,
              x - appState.selectedPane.x + appState.resizeOffsetX
            );
            appState.selectedPane.height = Math.max(
              MIN_PANE_SIZE,
              y - appState.selectedPane.y + appState.resizeOffsetY
            );
          } else if (appState.isDragging) {
            appState.selectedPane.x = x - appState.dragOffsetX;
            appState.selectedPane.y = y - appState.dragOffsetY;
          }
        }
      }

      function handleTouchEnd(e) {
        e.preventDefault();
        clearTimeout(appState.longPressTimeout);
        appState.selectedPane = null;
        appState.isDragging = false;
        appState.resizing = false;
      }

      // ---- Attach Event Listeners ----
      canvas.addEventListener("mousedown", handleMouseDown);
      canvas.addEventListener("mousemove", handleMouseMove);
      canvas.addEventListener("mouseup", handleMouseUp);
      canvas.addEventListener("mouseleave", handleMouseUp); // Reuse mouseup logic
      canvas.addEventListener("dblclick", handleDoubleClick);
      canvas.addEventListener("contextmenu", handleContextMenu);
      canvas.addEventListener("touchstart", handleTouchStart, {
        passive: false,
      });
      canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
      canvas.addEventListener("touchend", handleTouchEnd, { passive: false });

      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalCompositeOperation = "lighter";
        const currentTime = audioCtx.currentTime;
        const individualAreas = {};
        appState.panes.forEach((pane) => (individualAreas[pane.id] = 0));
        const compositeRegions = {};

        // Calculate pane coverage and composite regions
        for (let col = 0; col < GRID_COLUMNS; col++) {
          for (let row = 0; row < GRID_ROWS; row++) {
            const sampleX = (col + 0.5) * cellWidth;
            const sampleY = (row + 0.5) * cellHeight;
            const coveringPanes = appState.panes.filter(
              (pane) =>
                sampleX >= pane.x &&
                sampleX <= pane.x + pane.width &&
                sampleY >= pane.y &&
                sampleY <= pane.y + pane.height
            );

            if (coveringPanes.length === 1) {
              individualAreas[coveringPanes[0].id] += cellArea;
            } else if (coveringPanes.length >= 2) {
              const compositeKey = coveringPanes
                .map((pane) => pane.id)
                .sort()
                .join(",");
              if (!compositeRegions[compositeKey]) {
                compositeRegions[compositeKey] = {
                  area: 0,
                  sumX: 0,
                  sumY: 0,
                  sumR: 0,
                  sumG: 0,
                  sumB: 0,
                };
              }
              let r = 0,
                g = 0,
                b = 0;
              coveringPanes.forEach((pane) => {
                r = screenChannel(r, pane.rgb.r / 255);
                g = screenChannel(g, pane.rgb.g / 255);
                b = screenChannel(b, pane.rgb.b / 255);
              });
              compositeRegions[compositeKey].area += cellArea;
              compositeRegions[compositeKey].sumX += sampleX * cellArea;
              compositeRegions[compositeKey].sumY += sampleY * cellArea;
              compositeRegions[compositeKey].sumR += r * 255 * cellArea;
              compositeRegions[compositeKey].sumG += g * 255 * cellArea;
              compositeRegions[compositeKey].sumB += b * 255 * cellArea;
            }
          }
        }

        // Update individual pane volumes and frequencies
        appState.panes.forEach((pane) => {
          const volume = Math.min(
            0.05 * (individualAreas[pane.id] / REF_AREA),
            0.2
          );
          pane.gain.gain.setTargetAtTime(volume, currentTime, 0.05);
          pane.osc.frequency.setTargetAtTime(
            pane.baseFrequency,
            currentTime,
            0.05
          );
          pane.draw(ctx);
        });

        // Update composite oscillators
        for (const key in compositeRegions) {
          const region = compositeRegions[key];
          const area = region.area;
          const avgR = region.sumR / area;
          const avgG = region.sumG / area;
          const avgB = region.sumB / area;
          const [L] = rgbToLab(avgR, avgG, avgB);
          const compositeFrequency = getFrequencyFromLabL(L);
          const compositeVolume = Math.min(0.05 * (area / REF_AREA), 0.2);

          if (!appState.compositeOscillators[key]) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = compositeFrequency;
            gain.gain.value = 0.0001;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.0001, currentTime);
            gain.gain.exponentialRampToValueAtTime(
              compositeVolume,
              currentTime + 0.05
            );
            appState.compositeOscillators[key] = { osc, gain };
          } else {
            const oscillator = appState.compositeOscillators[key];
            oscillator.osc.frequency.setTargetAtTime(
              compositeFrequency,
              currentTime,
              0.05
            );
            oscillator.gain.gain.setTargetAtTime(
              compositeVolume,
              currentTime,
              0.05
            );
          }
        }

        // Remove unused composite oscillators. Reaped in-frame, no setTimeout:
        // a stale timeout's stop() on an already-stopped oscillator is a
        // no-op (it does not throw), so its delete could remove the key's
        // REPLACEMENT oscillator from the map -- orphaned at full gain,
        // unstoppable. Heavy overlap churn (fast formation spins) leaked
        // hundreds of droning voices that way.
        for (const key in appState.compositeOscillators) {
          const oscillator = appState.compositeOscillators[key];
          if (key in compositeRegions) {
            oscillator.dyingSince = 0;
          } else {
            oscillator.gain.gain.setTargetAtTime(0.0001, currentTime, 0.05);
            if (!oscillator.dyingSince) {
              oscillator.dyingSince = currentTime;
            } else if (currentTime - oscillator.dyingSince > 0.12) {
              oscillator.osc.stop();
              oscillator.osc.disconnect();
              oscillator.gain.disconnect();
              delete appState.compositeOscillators[key];
            }
          }
        }
      }
      animate();

      // ---- Utility Functions ----
      const getFrequencyFromLabL = (L) => 100 + ((L - 30) / 60) * 900;
      function hslToRgb(h, s, l) {
        s /= 100;
        l /= 100;
        const c = (1 - Math.abs(2 * l - 1)) * s,
          x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
          m = l - c / 2;
        let r, g, b;
        if (h < 60) [r, g, b] = [c, x, 0];
        else if (h < 120) [r, g, b] = [x, c, 0];
        else if (h < 180) [r, g, b] = [0, c, x];
        else if (h < 240) [r, g, b] = [0, x, c];
        else if (h < 300) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];
        return [
          Math.round((r + m) * 255),
          Math.round((g + m) * 255),
          Math.round((b + m) * 255),
        ];
      }
      function rgbToLab(r, g, b) {
        [r, g, b] = [r, g, b].map((v) => v / 255);
        r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
        g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
        b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
        const x = r * 0.4124564 + g * 0.3575761 + b * 0.1804375,
          y = r * 0.2126729 + g * 0.7151522 + b * 0.072175,
          z = r * 0.0193339 + g * 0.119192 + b * 0.9503041,
          xn = 0.95047,
          yn = 1,
          zn = 1.08883;
        const fx =
            x > 0.008856
              ? Math.pow(x / xn, 1 / 3)
              : (7.787 * x) / xn + 16 / 116,
          fy =
            y > 0.008856
              ? Math.pow(y / yn, 1 / 3)
              : (7.787 * y) / yn + 16 / 116,
          fz =
            z > 0.008856
              ? Math.pow(z / zn, 1 / 3)
              : (7.787 * z) / zn + 16 / 116;
        return [116 * fy - 16, 500 * (fx - fy), 200 * (fy - fz)];
      }
      const screenChannel = (a, b) => 1 - (1 - a) * (1 - b);
    </script>
  <div id="howto" style="position:fixed;left:22px;top:20px;z-index:1000;cursor:pointer;font-family:system-ui,Helvetica,Arial,sans-serif;font-size:12.5px;line-height:1.65;color:#b9b4a8;max-width:250px;transition:opacity .6s">Double-click to open a pane. Drag to move it; drag a corner to resize. Double-click a pane for its pitch slider. Right-click removes it. Overlaps make their own tones. Click to remove these instructions.</div>
<script>(function(){var h=document.getElementById("howto");h.addEventListener("pointerdown",function(e){e.stopPropagation();h.style.opacity="0";setTimeout(function(){h.remove()},700)});})();</script>
